<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="sil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e3e5e6"/>
      <stop offset="1" stop-color="#8d9296"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3b3b"/>
      <stop offset="1" stop-color="#b00010"/>
    </linearGradient>
  </defs>
  <!-- silver layered shadow behind, shifted left -->
  <polygon points="34,20 60,48 34,76 8,48" fill="url(#sil)"/>
  <polygon points="40,18 68,48 40,78 12,48" fill="#b9bdc0" opacity=".55"/>
  <!-- red diamond -->
  <polygon points="56,16 86,48 56,80 26,48" fill="url(#red)"/>
  <!-- darker facet for 3D -->
  <polygon points="56,16 86,48 56,80" fill="#000" opacity=".12"/>
